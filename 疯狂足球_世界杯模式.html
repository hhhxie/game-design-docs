<title>世界杯模式</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}body{width:100vw;height:100vh;overflow:hidden;display:grid;place-items:center;font-family:"Microsoft YaHei",system-ui,sans-serif;color:var(--text);background:#020611}body:before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 18% 10%,rgba(255,209,102,.18),transparent 26%),radial-gradient(circle at 82% 18%,rgba(73,160,255,.20),transparent 30%),linear-gradient(135deg,#020611,#07162a 52%,#071a16)}
.app{width:1920px;height:1080px;max-width:100vw;max-height:100vh;aspect-ratio:16/9;transform-origin:center;position:relative;padding:24px 34px;display:flex;flex-direction:column;gap:18px;overflow:hidden}.grid-bg{position:absolute;inset:0;opacity:.14;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle,black,transparent 80%)}
.header{position:relative;z-index:2;display:grid;grid-template-columns:520px 1fr 360px;align-items:center}.title{text-align:center}.title h1{font-size:46px;letter-spacing:8px;text-shadow:0 0 28px rgba(255,209,102,.25)}.title .sub{margin-top:8px;color:var(--muted);font-size:15px;letter-spacing:2px}.team-badge{height:142px;border:1px solid rgba(255,209,102,.35);border-radius:20px;background:rgba(8,18,34,.78);display:grid;grid-template-columns:78px 1fr 118px;grid-template-rows:auto 1fr;align-items:center;gap:8px 12px;padding:14px 16px;box-shadow:0 18px 44px rgba(0,0,0,.28)}.team-badge img{width:68px;height:46px;object-fit:cover;border-radius:9px;border:1px solid rgba(255,255,255,.3)}.team-badge .label{font-size:12px;color:var(--gold);font-weight:900;letter-spacing:2px}.team-badge .name{font-size:27px;font-weight:1000}.team-title{min-width:0}.team-sub{font-size:12px;color:var(--muted);margin-top:4px;white-space:nowrap}.mini-stats{grid-column:1 / 3;grid-row:2;display:grid;gap:6px;align-content:center}.mini-stat{display:grid;grid-template-columns:34px 1fr 30px;align-items:center;gap:7px;font-size:11px;font-weight:950;color:#eaf5ff}.mini-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden}.mini-fill{height:100%;border-radius:999px}.mini-fill.atk{background:#ff6b6b}.mini-fill.def{background:#4ecdc4}.mini-fill.spd{background:#ffe66d}.mini-pitch{grid-column:3;grid-row:1 / 3;position:relative;height:112px;border-radius:12px;border:1px solid rgba(118,224,157,.45);background:linear-gradient(180deg,rgba(33,139,77,.32),rgba(16,88,54,.30));overflow:hidden}.mini-pitch:before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.25)}.mini-pitch:after{content:"";position:absolute;left:50%;top:50%;width:28px;height:28px;border:1px solid rgba(255,255,255,.23);border-radius:50%;transform:translate(-50%,-50%)}.mini-pitch .box{position:absolute;left:24%;width:52%;height:13%;border:1px solid rgba(255,255,255,.2)}.mini-pitch .box.top{top:-1px;border-top:0;border-radius:0 0 6px 6px}.mini-pitch .box.bottom{bottom:-1px;border-bottom:0;border-radius:6px 6px 0 0}.mini-dot{position:absolute;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:7px;font-weight:950;color:#06111f;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}.mini-dot.fw{background:#ff6b6b}.mini-dot.mf{background:#ffe66d}.mini-dot.df{background:#4ecdc4}.mini-dot.gk{background:#8ea4bc}.stage-pill{justify-self:end;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:12px 22px;background:rgba(255,255,255,.06);font-weight:950;color:#dfefff;letter-spacing:2px}
.main{position:relative;z-index:2;flex:1;min-height:0}.group-view,.knockout-view,.champion-view{height:100%;display:none}.group-view.active,.knockout-view.active,.champion-view.active{display:grid}.group-view.active{display:flex;justify-content:center;align-items:center}.group-panel{width:980px;max-width:980px}.group-view{grid-template-columns:none;gap:0}.panel{border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(19,41,68,.86),rgba(7,15,29,.88));box-shadow:0 24px 64px rgba(0,0,0,.34);padding:20px;min-height:0}.panel-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.panel-title h2{font-size:28px;letter-spacing:2px}.round-tag{font-size:15px;color:var(--gold);font-weight:950}.match-card{height:142px;border-radius:22px;border:1px solid rgba(255,255,255,.13);background:radial-gradient(circle at 50% 0,rgba(255,209,102,.15),rgba(255,255,255,.04));display:grid;grid-template-columns:1fr 110px 1fr;align-items:center;padding:18px;margin-bottom:18px}.side{text-align:center}.side img{width:82px;height:56px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.28)}.side .n{font-size:24px;font-weight:1000;margin-top:6px}.side.mine .n{color:var(--gold);text-shadow:0 0 18px rgba(255,209,102,.3)}.score{font-size:40px;font-weight:1000;text-align:center;color:#fff}.score.pending{font-size:28px;color:var(--muted)}
.standings{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px}.standings th,.standings td{padding:13px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:center}.standings th{color:#abc0d6;font-size:13px;background:rgba(255,255,255,.06)}.standings td{font-size:16px;font-weight:850}.standings .team-cell{text-align:left;display:flex;align-items:center;gap:10px}.standings img{width:34px;height:23px;object-fit:cover;border-radius:4px}.standings tr.mine{background:rgba(255,209,102,.16);box-shadow:inset 4px 0 0 var(--gold)}.standings tr.qualified td{color:#dfffea}.fixture-list{display:grid;gap:10px;max-height:510px;overflow:hidden}.fixture{display:grid;grid-template-columns:1fr 58px 1fr 74px;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.09);border-radius:14px;background:rgba(255,255,255,.045);padding:10px 12px}.fixture .team{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fixture .team.mine{color:var(--gold)}.fixture .s{text-align:center;color:#fff;font-weight:1000}.fixture .status{font-size:12px;color:var(--muted);text-align:right}.fixture.done{opacity:.88}.fixture.current{border-color:rgba(255,209,102,.55);box-shadow:0 0 20px rgba(255,209,102,.12)}
.control{position:relative;z-index:3;display:flex;justify-content:center;gap:18px}.next-btn{border:0;border-radius:999px;padding:16px 42px;background:linear-gradient(90deg,#ffb703,#ffd166);color:#271500;font-size:22px;font-weight:1000;letter-spacing:2px;box-shadow:0 16px 44px rgba(255,183,3,.25);cursor:pointer}.next-btn:disabled{filter:grayscale(1);opacity:.5;cursor:not-allowed}.reset-btn{border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:14px 26px;background:rgba(255,255,255,.07);color:#d7e7f7;font-size:16px;font-weight:900;cursor:pointer}.modal{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(2,6,17,.72);backdrop-filter:blur(8px)}.modal.show{display:flex}.result-card{width:620px;border-radius:28px;border:1px solid rgba(255,209,102,.42);background:linear-gradient(180deg,rgba(23,47,77,.97),rgba(8,17,33,.97));box-shadow:0 36px 110px rgba(0,0,0,.58),0 0 40px rgba(255,209,102,.12);padding:28px;text-align:center}.result-card h2{font-size:32px;letter-spacing:3px;margin-bottom:20px}.result-match{display:grid;grid-template-columns:1fr 110px 1fr;align-items:center;gap:16px}.result-side img{width:96px;height:64px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.28)}.result-side .n{font-size:25px;font-weight:1000;margin-top:10px}.result-side.win .n{color:var(--green)}.result-side.lose{opacity:.72}.result-score{font-size:48px;font-weight:1000;color:#fff}.result-status{margin-top:20px;font-size:24px;font-weight:1000;color:var(--gold)}.ok-btn{margin-top:24px;border:0;border-radius:999px;padding:13px 44px;background:linear-gradient(90deg,#ffb703,#ffd166);color:#271500;font-size:20px;font-weight:1000;letter-spacing:2px;cursor:pointer}
.knockout-view.active{display:block}.bracket{height:100%;display:grid;grid-template-columns:repeat(6,1fr);gap:18px;align-items:center}.round{height:100%;display:flex;flex-direction:column;justify-content:space-around;gap:8px}.round h3{text-align:center;color:var(--muted);font-size:16px;letter-spacing:2px}.ko-match{position:relative;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(255,255,255,.05);padding:10px;min-height:72px}.ko-match.done{border-color:rgba(57,217,138,.32)}.ko-match.path{border-color:var(--gold);background:rgba(255,209,102,.13);box-shadow:0 0 0 2px rgba(255,209,102,.22),0 0 24px rgba(255,209,102,.12)}.ko-team{display:flex;align-items:center;gap:6px;justify-content:space-between;font-size:12px;font-weight:900;margin:3px 0}.ko-team .left{display:flex;align-items:center;gap:6px;min-width:0}.ko-team img{width:24px;height:16px;object-fit:cover;border-radius:3px}.ko-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:94px}.ko-team.winner{color:var(--green)}.ko-team.mine{color:var(--gold)}.connector{position:absolute;right:-19px;top:50%;width:19px;height:2px;background:rgba(255,255,255,.18)}.ko-match.path .connector{height:4px;background:var(--gold);box-shadow:0 0 12px rgba(255,209,102,.45)}
.champion-view{place-items:center;text-align:center}.champion-card{border-radius:34px;border:1px solid rgba(255,209,102,.45);background:radial-gradient(circle at 50% 0,rgba(255,209,102,.22),rgba(10,22,39,.95));padding:58px 88px;box-shadow:0 40px 120px rgba(0,0,0,.5)}.trophy{font-size:96px}.champion-card h2{font-size:58px;margin:12px 0}.champion-card img{width:118px;height:80px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.3)}.champion-card .name{font-size:40px;font-weight:1000;color:var(--gold);margin-top:14px}
/* 我的球队卡片：防止内容溢出 */
.header{grid-template-columns:1fr 320px;min-height:92px}.title{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:620px;pointer-events:none}.main{display:flex;flex-direction:column;align-items:center;gap:16px}.team-badge{height:132px;width:430px;grid-template-columns:58px 1fr 88px;grid-template-rows:50px 1fr;gap:6px 9px;padding:11px 13px;align-items:center;overflow:hidden;flex:0 0 auto}.team-badge img{width:52px;height:36px;border-radius:8px}.team-badge .label{font-size:10px;letter-spacing:1px}.team-badge .name{font-size:22px;line-height:1}.team-sub{font-size:10px;margin-top:3px}.mini-stats{gap:4px;align-content:center;min-width:0}.mini-stat{grid-template-columns:30px 1fr 25px;gap:5px;font-size:9px}.mini-bar{height:7px;max-width:210px}.mini-pitch{height:98px;border-radius:10px}.mini-dot{width:14px;height:14px;font-size:6px}.title h1{font-size:42px}.title .sub{font-size:14px}.group-view{width:100%;flex:1;min-height:0}.group-view.active{align-items:flex-start}.knockout-view,.champion-view{width:100%;flex:1;min-height:0}
/* 淘汰赛左右分区树：两侧向中心汇聚 */
.knockout-view.active{display:block}
.knockout-view .panel{padding:10px;height:100%}
.knockout-view .panel-title{display:none}
.knockout-view .panel-title h2{font-size:22px}
.bracket{height:100%;display:grid;grid-template-columns:repeat(9,160px);gap:6px;align-items:stretch;justify-content:center}
.round{height:100%;display:grid;grid-template-rows:repeat(16,1fr);gap:0;min-width:0;justify-items:center}
.round h3{display:none}
.round.right h3{color:#9fb6d1}.round.left h3{color:#9fb6d1}
.center-round{height:100%;display:grid;grid-template-rows:repeat(16,1fr);gap:0;min-width:0;justify-items:center}
.center-round h3{display:none}
.center-round .ko-match{width:148px;height:70px;min-height:0}
.champion-slot{display:none}
.ko-match{position:relative;align-self:center;justify-self:center;width:148px;max-width:148px;height:70px;min-height:0;padding:5px 6px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);display:grid;align-items:center}
.ko-match.done{border-color:rgba(57,217,138,.32)}
.ko-match.path{border-color:var(--gold);background:rgba(255,209,102,.13);box-shadow:0 0 0 2px rgba(255,209,102,.22),0 0 24px rgba(255,209,102,.12)}
.ko-versus{display:grid;grid-template-columns:minmax(0,1fr) 26px minmax(0,1fr);align-items:center;justify-items:center;gap:3px;width:100%;height:100%}
.ko-side{width:100%;height:100%;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-align:center}
.ko-side img{width:36px;height:24px;object-fit:cover;border-radius:5px;border:1px solid rgba(255,255,255,.25);box-shadow:0 4px 12px rgba(0,0,0,.18);flex:0 0 auto}
.ko-name{width:100%;font-size:12px;line-height:1;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.35);flex:0 0 auto}
.ko-score{display:grid;place-items:center;width:100%;height:100%;text-align:center;font-size:12px;font-weight:1000;color:#fff}
.ko-versus .winner{color:var(--green)}.ko-versus .mine{color:var(--gold)}
.connector{display:none}
.ko-team{display:flex;align-items:center;gap:6px;justify-content:space-between;font-size:12px;font-weight:900;margin:3px 0}.ko-team .left{display:flex;align-items:center;gap:6px;min-width:0}.ko-team img{width:24px;height:16px;object-fit:cover;border-radius:3px}.ko-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:94px}.ko-team.winner{color:var(--green)}.ko-team.mine{color:var(--gold)}
</style>
</head>

function flagUrl(code){if(code==='gb-sct')return 'https://flagcdn.com/w80/gb.png';if(code==='gb-eng')return 'https://flagcdn.com/w80/gb.png';return `https://flagcdn.com/w80/${code}.png`;}
const PLAYER_NAME='法国';let playerTeam;let groupTeams=[];let table={};let groupFixtures=[];let groupRounds=[];let groupIndex=0;let stage='group';let knockoutTeams=[];let rounds=[];let currentRound=0;let currentMatch=0;let pendingResult=null;
const groupView=document.getElementById('groupView'), knockoutView=document.getElementById('knockoutView'), championView=document.getElementById('championView'), nextBtn=document.getElementById('nextBtn'), resultModal=document.getElementById('resultModal'), resultContent=document.getElementById('resultContent');
function init(){pendingResult=null;resultModal.classList.remove('show');nextBtn.disabled=false;playerTeam=TEAMS.find(t=>t.name===PLAYER_NAME)||TEAMS[0];groupTeams=TEAMS.filter(t=>t.group===playerTeam.group);table={};groupTeams.forEach(t=>table[t.name]={team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,PTS:0});groupRounds=makeGroupRounds(groupTeams);groupFixtures=groupRounds.flat();groupIndex=0;stage='group';rounds=[];currentRound=0;currentMatch=0;renderAll();}
function makeGroupRounds(ts){return [[[ts[0],ts[1]],[ts[2],ts[3]]],[[ts[0],ts[2]],[ts[1],ts[3]]],[[ts[0],ts[3]],[ts[1],ts[2]]]].map((round,ri)=>round.map((m,mi)=>({a:m[0],b:m[1],score:null,idx:ri*2+mi,round:ri})));}
function simScore(a,b,forceAWin=false,forceBWin=false){let ga=Math.floor(Math.random()*4), gb=Math.floor(Math.random()*4);if(forceAWin&&ga<=gb)ga=gb+1;if(forceBWin&&gb<=ga)gb=ga+1;if(!forceAWin&&!forceBWin&&ga===gb&&Math.random()>.35)ga++;return [Math.min(ga,6),Math.min(gb,6)];}
function applyGroup(m){const forceA=m.a.name===playerTeam.name, forceB=m.b.name===playerTeam.name;const [ga,gb]=simScore(m.a,m.b,forceA,forceB);m.score=[ga,gb];updateTable(m.a,m.b,ga,gb);return {stage:'小组赛',a:m.a,b:m.b,score:[ga,gb],winner:ga>gb?m.a:gb>ga?m.b:null};}
function updateTable(a,b,ga,gb){const A=table[a.name],B=table[b.name];A.P++;B.P++;A.GF+=ga;A.GA+=gb;B.GF+=gb;B.GA+=ga;A.GD=A.GF-A.GA;B.GD=B.GF-B.GA;if(ga>gb){A.W++;B.L++;A.PTS+=3}else if(gb>ga){B.W++;A.L++;B.PTS+=3}else{A.D++;B.D++;A.PTS++;B.PTS++}}
function sortedGroup(){return Object.values(table).sort((a,b)=>b.PTS-a.PTS||b.GD-a.GD||b.GF-a.GF)}
function next(){if(pendingResult)return;if(stage==='group'){if(groupIndex<groupRounds.length){const round=groupRounds[groupIndex];const playerMatch=round.find(m=>m.a.name===playerTeam.name||m.b.name===playerTeam.name);pendingResult=applyGroup(playerMatch);round.filter(m=>m!==playerMatch).forEach(m=>applyGroup(m));groupIndex++;if(groupIndex>=groupRounds.length){buildKnockout();stage='ko'}showResultModal(pendingResult);return}}else if(stage==='ko'){pendingResult=playNextKO();if(pendingResult)showResultModal(pendingResult);}}
function buildKnockout(){const qualified=[];for(const g of 'ABCDEFGHIJKL'){const arr=TEAMS.filter(t=>t.group===g);let ranked=arr.slice().sort((a,b)=>(b.atk+b.def+b.spd)-(a.atk+a.def+a.spd));if(g===playerTeam.group){ranked=sortedGroup().map(x=>x.team)}qualified.push(ranked[0],ranked[1]);}const extras=TEAMS.filter(t=>!qualified.includes(t)).sort((a,b)=>(b.atk+b.def+b.spd)-(a.atk+a.def+a.spd)).slice(0,8);knockoutTeams=[...qualified,...extras].slice(0,32);if(!knockoutTeams.includes(playerTeam)){knockoutTeams[0]=playerTeam}rounds=[makeRound(knockoutTeams,'32强')];currentRound=0;currentMatch=0;}
function makeRound(teams,name){const matches=[];for(let i=0;i<teams.length;i+=2){matches.push({name,a:teams[i],b:teams[i+1],score:null,winner:null,path:false})}return matches;}
function playNextKO(){const r=rounds[currentRound];if(!r)return null;const playerMatch=r.find(m=>m.a?.name===playerTeam.name||m.b?.name===playerTeam.name);if(!playerMatch)return null;function resolveMatch(m){const forceA=m.a&&m.a.name===playerTeam.name, forceB=m.b&&m.b.name===playerTeam.name;const [ga,gb]=simScore(m.a,m.b,forceA,forceB);m.score=[ga,gb];m.winner=ga>gb?m.a:m.b;m.path=m.winner.name===playerTeam.name;return {stage:r[0]?.name||'淘汰赛',a:m.a,b:m.b,score:[ga,gb],winner:m.winner};}const result=resolveMatch(playerMatch);r.filter(m=>m!==playerMatch&&!m.score).forEach(resolveMatch);const winners=r.map(x=>x.winner);if(winners.length===1){stage='champion';return result}rounds.push(makeRound(winners,roundName(winners.length)));currentRound++;currentMatch=0;return result;}
function roundName(teamCount){return teamCount===16?'16强':teamCount===8?'8强':teamCount===4?'半决赛':teamCount===2?'决赛':'淘汰赛'}
function showResultModal(res){const [ga,gb]=res.score;const aWin=res.winner&&res.winner.name===res.a.name;const bWin=res.winner&&res.winner.name===res.b.name;const playerIn=res.a.name===playerTeam.name||res.b.name===playerTeam.name;const playerWin=res.winner&&res.winner.name===playerTeam.name;resultContent.innerHTML=`<div class="result-match"><div class="result-side ${aWin?'win':'lose'}"><img src="${flagUrl(res.a.flag)}"><div class="n">${res.a.name}</div><div>${aWin?'胜利':'失败'}</div></div><div class="result-score">${ga} : ${gb}</div><div class="result-side ${bWin?'win':'lose'}"><img src="${flagUrl(res.b.flag)}"><div class="n">${res.b.name}</div><div>${bWin?'胜利':'失败'}</div></div></div><div class="result-status">${res.stage} · ${playerIn?(playerWin?'我的球队获胜':'我的球队失利'):(res.winner?res.winner.name+' 晋级':'平局')}</div>`;resultModal.classList.add('show');nextBtn.disabled=true;}
function confirmResult(){resultModal.classList.remove('show');pendingResult=null;renderAll();}
function renderAll(){renderHeader();if(stage==='group'){show('group');renderGroup()}else if(stage==='ko'){show('ko');renderKO()}else{show('champion');renderChampion()}}
function show(s){groupView.classList.toggle('active',s==='group');knockoutView.classList.toggle('active',s==='ko');championView.classList.toggle('active',s==='champion');document.getElementById('stagePill').textContent=s==='group'?'小组赛':s==='ko'?'淘汰赛':'冠军';nextBtn.disabled=s==='champion'}
function total(t){return t.atk+t.def+t.spd}
function formationLabel(f){return f==='2-1-1'?'进攻型':f==='1-2-1'?'均衡型':'防守型'}
function miniStat(label,value,type){return `<div class="mini-stat"><span>${label}</span><div class="mini-bar"><div class="mini-fill ${type}" style="width:${value}%"></div></div><span>${value}</span></div>`}
function miniPitchDots(f){const maps={'2-1-1':[['FW',35,18,'fw'],['FW',65,18,'fw'],['MF',50,38,'mf'],['DF',50,62,'df'],['GK',50,84,'gk']],'1-2-1':[['FW',50,17,'fw'],['MF',35,38,'mf'],['MF',65,38,'mf'],['DF',50,62,'df'],['GK',50,84,'gk']],'1-1-2':[['FW',50,17,'fw'],['MF',50,38,'mf'],['DF',35,62,'df'],['DF',65,62,'df'],['GK',50,84,'gk']]};return maps[f].map(d=>`<span class="mini-dot ${d[3]}" style="left:calc(${d[1]}% - 7px);top:calc(${d[2]}% - 7px)">${d[0]}</span>`).join('')}
function renderHeader(){document.getElementById('playerBadge').innerHTML=`<img src="${flagUrl(playerTeam.flag)}"><div class="team-title"><div class="label">我的球队</div><div class="name">${playerTeam.name}</div><div class="team-sub">${playerTeam.formation} · ${formationLabel(playerTeam.formation)} · 总评 ${total(playerTeam)}</div></div><div class="mini-stats">${miniStat('ATK',playerTeam.atk,'atk')}${miniStat('DEF',playerTeam.def,'def')}${miniStat('SPD',playerTeam.spd,'spd')}</div><div class="mini-pitch"><span class="box top"></span><span class="box bottom"></span>${miniPitchDots(playerTeam.formation)}</div>`}
function renderGroup(){document.getElementById('groupTitle').textContent=`${playerTeam.group}组 · 小组赛`;document.getElementById('groupRoundTag').textContent=`场次 ${Math.min(groupIndex+1,groupRounds.length)} / ${groupRounds.length}`;const curRound=groupRounds[Math.min(groupIndex,groupRounds.length-1)];const cur=curRound.find(m=>m.a.name===playerTeam.name||m.b.name===playerTeam.name);document.getElementById('currentMatch').innerHTML=matchCard(cur,groupIndex>=groupRounds.length);document.getElementById('standings').innerHTML=`<thead><tr><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>进球</th><th>失球</th><th>净胜</th><th>积分</th></tr></thead><tbody>${sortedGroup().map((x,i)=>`<tr class="${x.team.name===playerTeam.name?'mine':''} ${i<2?'qualified':''}"><td class="team-cell"><img src="${flagUrl(x.team.flag)}">${x.team.name}</td><td>${x.P}</td><td>${x.W}</td><td>${x.D}</td><td>${x.L}</td><td>${x.GF}</td><td>${x.GA}</td><td>${x.GD}</td><td>${x.PTS}</td></tr>`).join('')}</tbody>`;}
function matchCard(m,done){return `<div class="match-card"><div class="side ${m.a.name===playerTeam.name?'mine':''}"><img src="${flagUrl(m.a.flag)}"><div class="n">${m.a.name}</div></div><div class="score ${m.score?'':'pending'}">${m.score?m.score.join(' : '):(done?'完成':'VS')}</div><div class="side ${m.b.name===playerTeam.name?'mine':''}"><img src="${flagUrl(m.b.flag)}"><div class="n">${m.b.name}</div></div></div>`}
function renderKO(){const columns=[];for(let ri=0;ri<4;ri++){const r=rounds[ri]||[];const mid=Math.ceil(r.length/2);const left=r.slice(0,mid);columns[ri]=`<div class="round left">${left.map((m,i)=>koMatch(m,ri,i)).join('')}</div>`;const right=r.slice(mid);columns[8-ri]=`<div class="round right">${right.map((m,i)=>koMatch(m,ri,i)).join('')}</div>`;}const finalMatch=(rounds[4]||[]).map((m,i)=>koMatch(m,4,i)).join('')||'';columns[4]=`<div class="center-round">${finalMatch}</div>`;document.getElementById('koRoundTag').textContent='';document.getElementById('bracket').innerHTML=columns.join('');}
function koMatch(m,ri,mi=0){const sa=m.score?m.score[0]:'',sb=m.score?m.score[1]:'';const step=Math.pow(2,ri);const row=step+(mi*step*2);const style=ri<4?` style="grid-row:${row} / span 2"`:' style="grid-row:8 / span 2"';return `<div class="ko-match ${m.score?'done':''} ${m.path?'path':''}"${style}><div class="ko-versus"><div class="ko-side"><img src="${flagUrl(m.a.flag)}"><span class="ko-name ${m.winner===m.a?'winner':''} ${m.a?.name===playerTeam.name?'mine':''}">${m.a.name}</span></div><b class="ko-score">${m.score?sa+'-'+sb:'VS'}</b><div class="ko-side"><img src="${flagUrl(m.b.flag)}"><span class="ko-name ${m.winner===m.b?'winner':''} ${m.b?.name===playerTeam.name?'mine':''}">${m.b.name}</span></div></div>${ri<4?'<span class="connector"></span>':''}</div>`}
function renderChampion(){document.getElementById('championFlag').src=flagUrl(playerTeam.flag);document.getElementById('championName').textContent=playerTeam.name;}
function resize(){document.querySelector('.app').style.transform=`scale(${Math.min(innerWidth/1920,innerHeight/1080)})`}addEventListener('resize',resize);nextBtn.onclick=next;document.getElementById('resetBtn').onclick=init;document.getElementById('resultOk').onclick=confirmResult;resize();init();
</script>
</body>
