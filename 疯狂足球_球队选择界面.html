<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>疯狂足球 · 球队选择界面</title>
<style>
:root{
  --bg:#06111f;
  --panel:#0f1f35;
  --panel-2:#142944;
  --line:rgba(255,255,255,.12);
  --text:#f6fbff;
  --muted:#8ea4bc;
  --p1:#ff4b4b;
  --p2:#49a0ff;
  --gold:#ffd166;
  --green:#39d98a;
  --atk:#ff6b6b;
  --def:#4ecdc4;
  --spd:#ffe66d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  width:100vw;height:100vh;overflow:hidden;
  display:grid;place-items:center;
  font-family:"Microsoft YaHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  background:#020611;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(circle at 20% 10%,rgba(255,75,75,.2),transparent 28%),
    radial-gradient(circle at 80% 18%,rgba(73,160,255,.2),transparent 30%),
    linear-gradient(135deg,#030711,#07192c 45%,#071a16);
}
.app{position:relative;width:1920px;height:1080px;max-width:100vw;max-height:100vh;aspect-ratio:16/9;padding:18px 30px 20px;display:flex;flex-direction:column;gap:14px;overflow:hidden;transform-origin:center center}
.bg-grid{position:absolute;inset:0;opacity:.17;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle,black,transparent 78%)}
.topbar{position:relative;display:grid;grid-template-columns:480px 1fr 480px;align-items:start;gap:20px;z-index:2;min-height:160px}
.pick-badge{height:156px;border:1px solid var(--line);border-radius:18px;padding:12px 14px;background:rgba(8,18,34,.76);box-shadow:0 14px 36px rgba(0,0,0,.25);display:flex;align-items:stretch;gap:12px;overflow:hidden}
.pick-badge.p1{border-color:rgba(255,75,75,.38)}
.pick-badge.p2{border-color:rgba(73,160,255,.38);justify-content:flex-end;text-align:left}
.pick-badge.previewing{border-color:rgba(255,209,102,.55);box-shadow:0 14px 36px rgba(0,0,0,.25),0 0 28px rgba(255,209,102,.12)}
.pick-badge.locked{border-color:rgba(57,217,138,.55)}
.pick-badge .slot{font-size:15px;font-weight:900;letter-spacing:1px;opacity:.9;min-width:46px;display:flex;align-items:center;justify-content:center}
.pick-badge.p1 .slot{color:var(--p1)}
.pick-badge.p2 .slot{color:var(--p2)}
.pick-badge .flag{width:68px;height:46px;object-fit:cover;border-radius:7px;border:1px solid rgba(255,255,255,.25);background:#111;box-shadow:0 6px 16px rgba(0,0,0,.35)}
.pick-badge .empty{font-size:18px;color:var(--muted);font-weight:800;display:flex;align-items:center}
.pick-badge .team-name{font-size:24px;font-weight:950;line-height:1.05;white-space:nowrap}
.pick-badge .team-sub{font-size:12px;color:var(--muted);margin-top:4px}
.preview-card{display:grid;grid-template-columns:78px 1fr 116px;grid-template-rows:auto 1fr;gap:8px 12px;align-items:center;width:100%;min-width:0}
.preview-card .flag{grid-row:1;width:68px;height:46px}
.preview-title{min-width:0}.preview-title .team-name{overflow:hidden;text-overflow:ellipsis}.preview-title .team-sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-card .mini-stats{grid-column:1 / 3;grid-row:2;gap:5px}
.preview-card .mini-pitch{grid-column:3;grid-row:1 / 3;height:104px}
.pick-badge.p2 .preview-card{grid-template-columns:116px 1fr 78px}
.pick-badge.p2 .preview-card .flag{grid-column:3}.pick-badge.p2 .preview-title{grid-column:2;grid-row:1}.pick-badge.p2 .mini-stats{grid-column:2 / 4;grid-row:2}.pick-badge.p2 .mini-pitch{grid-column:1;grid-row:1 / 3}
.title{text-align:center;padding-top:2px}
.title h1{font-size:38px;letter-spacing:6px;text-shadow:0 0 24px rgba(255,209,102,.28)}
.title .sub{margin-top:8px;color:var(--muted);font-size:14px;letter-spacing:2px}
.phase-pill{display:inline-flex;align-items:center;gap:9px;margin-top:10px;padding:8px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);font-weight:900;letter-spacing:2px}
.phase-dot{width:10px;height:10px;border-radius:50%;background:var(--p1);box-shadow:0 0 16px var(--p1)}
.phase-pill.p2 .phase-dot{background:var(--p2);box-shadow:0 0 16px var(--p2)}
.phase-pill.done .phase-dot{background:var(--green);box-shadow:0 0 16px var(--green)}
.main{position:relative;z-index:2;display:block;min-height:0;flex:1}
.team-grid{height:100%;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(6,92px);gap:8px;align-content:start;overflow:visible}
.team-card{position:relative;border-radius:12px;border:1px solid rgba(255,255,255,.13);background:linear-gradient(90deg,rgba(255,255,255,.10),rgba(255,255,255,.045));padding:7px 12px;display:flex;flex-direction:row;justify-content:flex-start;align-items:center;gap:10px;min-width:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 5px 14px rgba(0,0,0,.16);transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease,background .12s ease,filter .12s ease,color .12s ease;color:#f6fbff;text-align:left;overflow:hidden}
.team-card .flag{width:42px;height:28px;flex:0 0 auto;object-fit:cover;border-radius:5px;border:1px solid rgba(255,255,255,.32);background:#111;box-shadow:0 4px 10px rgba(0,0,0,.38)}
.team-card .name{font-size:17px;font-weight:950;color:#f8fbff;text-shadow:0 2px 6px rgba(0,0,0,.75);white-space:nowrap;text-overflow:ellipsis;overflow:hidden;max-width:100%;letter-spacing:.4px}
.team-card .picked-mark{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:950;padding:2px 5px;border-radius:7px;background:rgba(0,0,0,.42);color:#fff;display:none}
.team-card.picked-p1 .picked-mark.p1,.team-card.picked-p2 .picked-mark.p2{display:block}
.team-card.picked-p1{filter:saturate(.82) brightness(.72);border-color:rgba(255,75,75,.38)}
.team-card.picked-p2{filter:saturate(.82) brightness(.72);border-color:rgba(73,160,255,.38)}
.team-card.active{transform:none;z-index:20;border-color:var(--gold);background:linear-gradient(90deg,rgba(255,209,102,.24),rgba(255,255,255,.08));box-shadow:0 0 0 2px rgba(255,209,102,.25),0 12px 28px rgba(0,0,0,.42),0 0 28px rgba(255,209,102,.16);overflow:hidden}
.team-card.active .flag{width:42px;height:28px}
.team-card.active .name{color:#ffffff;font-size:17px;text-shadow:0 0 10px rgba(255,209,102,.45),0 2px 6px rgba(0,0,0,.85)}
.team-card.active::after{content:"";position:absolute;inset:-4px;border-radius:16px;border:2px solid rgba(255,209,102,.42);animation:pulse 1s infinite ease-in-out;pointer-events:none}
.mini-detail{display:none}
.team-card.active .mini-detail{display:none}
.mini-stats{display:grid;gap:5px;align-content:center}
.mini-stat{display:grid;grid-template-columns:34px 1fr 28px;align-items:center;gap:6px;font-size:10px;font-weight:950;color:#eaf5ff}
.mini-bar{height:7px;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden}
.mini-fill{height:100%;border-radius:999px}.mini-fill.atk{background:var(--atk)}.mini-fill.def{background:var(--def)}.mini-fill.spd{background:var(--spd)}
.mini-pitch{position:relative;height:92px;border-radius:10px;border:1px solid rgba(118,224,157,.45);background:linear-gradient(180deg,rgba(33,139,77,.32),rgba(16,88,54,.30));overflow:hidden}
.mini-pitch::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.25)}
.mini-pitch::after{content:"";position:absolute;left:50%;top:50%;width:25px;height:25px;border:1px solid rgba(255,255,255,.23);border-radius:50%;transform:translate(-50%,-50%)}
.mini-pitch .box{position:absolute;left:24%;width:52%;height:13%;border:1px solid rgba(255,255,255,.2)}
.mini-pitch .box.top{top:-1px;border-top:0;border-radius:0 0 6px 6px}.mini-pitch .box.bottom{bottom:-1px;border-bottom:0;border-radius:6px 6px 0 0}
.mini-dot{position:absolute;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:7px;font-weight:950;color:#06111f;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.mini-dot.fw{background:#ff6b6b}.mini-dot.mf{background:#ffe66d}.mini-dot.df{background:#4ecdc4}.mini-dot.gk{background:#8ea4bc}
.team-card.active .picked-mark{top:10px;right:10px;transform:none}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.9;transform:scale(1.018)}}
.detail-panel{height:100%;border:1px solid rgba(255,255,255,.13);border-radius:22px;background:linear-gradient(180deg,rgba(17,34,56,.92),rgba(7,16,31,.92));box-shadow:0 20px 52px rgba(0,0,0,.35);padding:22px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.detail-head{display:flex;gap:14px;align-items:center;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.detail-head .flag{width:84px;height:56px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.28);background:#111;box-shadow:0 10px 24px rgba(0,0,0,.35)}
.detail-title h2{font-size:33px;line-height:1;font-weight:1000}
.detail-title .en{color:var(--muted);margin-top:5px;font-size:13px}
.style-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-size:12px;color:#d9e8f7;font-weight:800}
.stats{display:grid;gap:11px;margin-top:16px}
.compact-stats{margin-top:0;gap:18px;padding:12px 4px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.compact-stats .stat{grid-template-columns:54px 1fr 46px;gap:12px}
.compact-stats .stat-label{font-size:15px}
.compact-stats .stat-num{font-size:16px}
.compact-stats .bar{height:16px}
.stat{display:grid;grid-template-columns:44px 1fr 42px;align-items:center;gap:9px}
.stat-label{font-size:13px;font-weight:950;color:#dce7f5}
.stat-num{text-align:right;font-weight:950}
.bar{height:11px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;box-shadow:inset 0 1px 4px rgba(0,0,0,.25)}
.fill{height:100%;border-radius:999px;box-shadow:0 0 14px currentColor}
.fill.atk{background:var(--atk);color:var(--atk)}
.fill.def{background:var(--def);color:var(--def)}
.fill.spd{background:var(--spd);color:var(--spd)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.info-box{border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);padding:10px}
.info-label{font-size:11px;color:var(--muted);font-weight:900;letter-spacing:1px;margin-bottom:4px}
.info-value{font-size:17px;font-weight:950;line-height:1.2}
.formation{margin-top:14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:radial-gradient(circle at 50% 35%,rgba(57,217,138,.16),rgba(255,255,255,.04));padding:13px;display:grid;grid-template-columns:112px 1fr;gap:12px;align-items:center}
.compact-formation{margin-top:22px;padding:18px;display:block;flex:1;min-height:0}
.compact-formation .pitch{height:100%;min-height:610px}
.compact-formation .dot{width:34px;height:34px;font-size:12px}
.pitch{height:162px;border:2px solid rgba(118,224,157,.45);border-radius:16px;background:linear-gradient(180deg,rgba(33,139,77,.35),rgba(16,88,54,.32));position:relative;overflow:hidden}
.pitch .box{position:absolute;left:22%;width:56%;height:13%;border:1px solid rgba(255,255,255,.22)}
.pitch .box.top{top:-1px;border-top:0;border-radius:0 0 10px 10px}
.pitch .box.bottom{bottom:-1px;border-bottom:0;border-radius:10px 10px 0 0}
.pitch::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.25)}
.pitch::after{content:"";position:absolute;left:50%;top:50%;width:45px;height:45px;border:1px solid rgba(255,255,255,.24);border-radius:50%;transform:translate(-50%,-50%)}
.dot{position:absolute;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:950;color:#06111f;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.35)}
.dot.fw{background:#ff6b6b}.dot.mf{background:#ffe66d}.dot.df{background:#4ecdc4}.dot.gk{background:#8ea4bc}
.formation-text{white-space:pre;line-height:1.55;color:#eaf5ff;font-family:Consolas,"Courier New",monospace;font-weight:900;font-size:18px}
.desc{margin-top:12px;color:#d3e3f3;line-height:1.55;font-size:14px;background:rgba(255,255,255,.045);padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.08)}
.help{margin-top:auto;padding-top:12px;color:#8ea4bc;font-size:12px;line-height:1.7;border-top:1px solid rgba(255,255,255,.08)}
.footer-help{position:relative;z-index:2;margin-top:0;padding-top:4px;text-align:center;border-top:0}
.help kbd{display:inline-block;min-width:23px;text-align:center;padding:2px 5px;border-radius:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.17);color:#fff;font-weight:900;margin:0 2px}
.flash{animation:confirmFlash .5s ease-out}
@keyframes confirmFlash{0%{box-shadow:0 0 0 0 rgba(57,217,138,.9)}100%{box-shadow:0 0 0 22px rgba(57,217,138,0)}}
.overlay{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(3,7,17,.7);backdrop-filter:blur(8px)}
.overlay.show{display:flex}.result{border-radius:26px;padding:32px 38px;background:linear-gradient(180deg,rgba(23,47,77,.95),rgba(8,17,33,.95));border:1px solid rgba(255,255,255,.16);box-shadow:0 30px 90px rgba(0,0,0,.55);text-align:center;min-width:560px}.result h2{font-size:36px;margin-bottom:20px}.vs{display:flex;align-items:center;justify-content:center;gap:20px}.vs-team{width:200px}.vs-team img{width:92px;height:62px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.25)}.vs-team .n{font-size:24px;font-weight:1000;margin-top:10px}.vs-mid{font-size:34px;color:var(--gold);font-weight:1000}.restart{margin-top:24px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">

      <div class="vs" id="vsBox"></div>
      <div class="restart">按 <b>R</b> 重新选择</div>

  </div>
</div>

const FORMATIONS = {
  "2-1-1": "FW  FW\n  MF\n  DF\n  GK",
  "1-2-1": "  FW\nMF  MF\n  DF\n  GK",
  "1-1-2": "  FW\n  MF\nDF  DF\n  GK",
};

function flagUrl(code) {
  if (code === 'gb-sct') return 'https://flagcdn.com/w80/gb.png';
  if (code === 'gb-eng') return 'https://flagcdn.com/w80/gb.png';
  return `https://flagcdn.com/w80/${code}.png`;
}

const grid = document.getElementById('teamGrid');
const phasePill = document.getElementById('phasePill');
const phaseText = document.getElementById('phaseText');
const p1Badge = document.getElementById('p1Badge');
const p2Badge = document.getElementById('p2Badge');
const overlay = document.getElementById('overlay');
const vsBox = document.getElementById('vsBox');
const COLS = 8;
let cursor = 0;
let phase = 1;
let p1 = null;
let p2 = null;

function total(t){return t.atk + t.def + t.spd;}
function formationLabel(f){return f === '2-1-1' ? '进攻型' : f === '1-2-1' ? '均衡型' : '防守型';}
function renderGrid(){
  grid.innerHTML = TEAMS.map((t,i)=>`
    <button class="team-card" data-index="${i}" aria-label="${t.name}">
      <span class="picked-mark p1">1P</span><span class="picked-mark p2">2P</span>
      <img class="flag" src="${flagUrl(t.flag)}" alt="${t.name}" onerror="this.style.display='none'">
      <div class="name">${t.name}</div>
    </button>`).join('');
  [...grid.children].forEach(btn=>{
    btn.addEventListener('mouseenter',()=>setCursor(Number(btn.dataset.index)));
    btn.addEventListener('click',()=>confirmPick());
  });
  updateUI();
}
function setCursor(i){
  cursor = (i + TEAMS.length) % TEAMS.length;
  updateUI();
}
function updateUI(){
  [...grid.children].forEach((card,i)=>{
    card.classList.toggle('active', i === cursor);
    card.classList.toggle('picked-p1', p1 === i);
    card.classList.toggle('picked-p2', p2 === i);
  });
  if(phase === 1){
    phasePill.className='phase-pill';phaseText.textContent='1P 选择球队';
    renderPreviewBadge(p1Badge, cursor, 1, false);
    renderEmptyBadge(p2Badge, 2);
  }
  else if(phase === 2){
    phasePill.className='phase-pill p2';phaseText.textContent='2P 选择球队';
    renderPreviewBadge(p1Badge, p1, 1, true);
    renderPreviewBadge(p2Badge, cursor, 2, false);
  }
  else{
    phasePill.className='phase-pill done';phaseText.textContent='选择完成';
    renderPreviewBadge(p1Badge, p1, 1, true);
    renderPreviewBadge(p2Badge, p2, 2, true);
  }
}
function renderEmptyBadge(el, side){
  el.classList.remove('previewing','locked');
  el.innerHTML = side === 1 ? '<div class="slot">1P</div><div class="empty">等待选择</div>' : '<div class="empty">等待选择</div><div class="slot">2P</div>';
}
function renderPreviewBadge(el, idx, side, locked){
  if(idx === null || idx === undefined){ renderEmptyBadge(el, side); return; }
  const t = TEAMS[idx];
  el.classList.toggle('previewing', !locked);
  el.classList.toggle('locked', locked);
  const card = `<div class="preview-card">
    <img class="flag" src="${flagUrl(t.flag)}" alt="${t.name}">
    <div class="preview-title"><div class="team-name">${t.name}</div><div class="team-sub">${t.formation} · ${formationLabel(t.formation)} · 总评 ${total(t)}</div></div>
    <div class="mini-stats">${miniStat('ATK',t.atk,'atk')}${miniStat('DEF',t.def,'def')}${miniStat('SPD',t.spd,'spd')}</div>
    <div class="mini-pitch"><span class="box top"></span><span class="box bottom"></span>${miniPitchDots(t.formation)}</div>
  </div>`;
  el.innerHTML = side === 1 ? `<div class="slot">1P</div>${card}` : `${card}<div class="slot">2P</div>`;
}
function miniDetail(t){
  const f = t.formation;
  return `<div class="mini-detail">
    <div class="mini-stats">
      ${miniStat('ATK',t.atk,'atk')}${miniStat('DEF',t.def,'def')}${miniStat('SPD',t.spd,'spd')}
    </div>
    <div class="mini-pitch"><span class="box top"></span><span class="box bottom"></span>${miniPitchDots(f)}</div>
  </div>`;
}
function miniStat(label,value,type){return `<div class="mini-stat"><span>${label}</span><div class="mini-bar"><div class="mini-fill ${type}" style="width:${value}%"></div></div><span>${value}</span></div>`;}
function statRow(label,value,type){return `<div class="stat"><div class="stat-label">${label}</div><div class="bar"><div class="fill ${type}" style="width:${value}%"></div></div><div class="stat-num">${value}</div></div>`;}
function miniPitchDots(f){
  const maps={
    '2-1-1':[['FW',35,18,'fw'],['FW',65,18,'fw'],['MF',50,38,'mf'],['DF',50,62,'df'],['GK',50,84,'gk']],
    '1-2-1':[['FW',50,17,'fw'],['MF',35,38,'mf'],['MF',65,38,'mf'],['DF',50,62,'df'],['GK',50,84,'gk']],
    '1-1-2':[['FW',50,17,'fw'],['MF',50,38,'mf'],['DF',35,62,'df'],['DF',65,62,'df'],['GK',50,84,'gk']]
  };
  return maps[f].map(d=>`<span class="mini-dot ${d[3]}" style="left:calc(${d[1]}% - 8px);top:calc(${d[2]}% - 8px)">${d[0]}</span>`).join('');
}
function confirmPick(){
  if(phase === 1){
    p1 = cursor; phase = 2;
    let next = cursor; for(let k=1;k<=TEAMS.length;k++){ if((cursor+k)%TEAMS.length !== p1){ next=(cursor+k)%TEAMS.length; break; } }
    cursor = next;
  }else if(phase === 2){
    if(cursor === p1){ shakeActive(); return; }
    p2 = cursor; phase = 3; showResult();
  }
  updateUI();
}
function shakeActive(){
  const card = grid.children[cursor];
  card.animate([{transform:'translateX(0)'},{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:220});
}
function showResult(){
  const a=TEAMS[p1], b=TEAMS[p2];
  vsBox.innerHTML = `<div class="vs-team"><img src="${flagUrl(a.flag)}"><div class="n">${a.name}</div><div class="team-sub">1P · ${a.formation}</div></div><div class="vs-mid">VS</div><div class="vs-team"><img src="${flagUrl(b.flag)}"><div class="n">${b.name}</div><div class="team-sub">2P · ${b.formation}</div></div>`;
  overlay.classList.add('show');
}
function reset(){p1=null;p2=null;phase=1;cursor=0;overlay.classList.remove('show');updateUI();}
document.addEventListener('keydown',e=>{
  const key=e.key;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(key)) e.preventDefault();
  if(key === 'r' || key === 'R'){reset();return;}
  if(phase === 3) return;
  if(key === 'ArrowLeft') setCursor(cursor-1);
  if(key === 'ArrowRight') setCursor(cursor+1);
  if(key === 'ArrowUp') setCursor(cursor-COLS);
  if(key === 'ArrowDown') setCursor(cursor+COLS);
  if(key === 'Enter' || key === ' ') confirmPick();
});
function resizeStage(){
  const app = document.querySelector('.app');
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  app.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeStage);
resizeStage();
renderGrid();
</script>
